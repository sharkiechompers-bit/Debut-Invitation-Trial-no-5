<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dana’s 18th Birthday Invitation</title>

  <style>
    @font-face {
      font-family: "Xiomara";
      src: url("./Xiomara-Script.ttf") format("truetype");
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      /* Background fix: ensuring it fills the screen */
      background: url('red-roses-bg.jpg') no-repeat center center fixed;
      background-size: cover; 
      font-family: "Xiomara", serif;
      color: #ffffff; /* White text */
      overflow-x: hidden;
    }

    /* Changed Butterflies to Falling Petals */
    .petals {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('petals.png') repeat; /* Make sure you have a petals.png! */
      animation: petalFall 25s linear infinite;
      opacity: 0.7;
      pointer-events: none;
      z-index: 10;
    }

    @keyframes petalFall {
      from { background-position: 0 0; }
      to { background-position: 500px 1000px; }
    }

    .container {
      width: 90%;
      max-width: 500px;
      margin-top: 10vh;
      text-align: center;
      position: relative;
      z-index: 2;
      padding-bottom: 100px;
    }

    .envelope {
      width: 180px;
      height: 120px;
      background: url('red-env.png') no-repeat center/contain;
      cursor: pointer;
      margin: 40px auto 10px auto;
      transition: transform 0.8s ease-out, opacity 0.5s;
    }

    .envelope.open {
      transform: translateY(-50px) scale(0.5);
      opacity: 0;
    }

    .invite-text {
      font-size: 1.8rem;
      color: #ffffff;
      animation: pulse 2s infinite ease-in-out;
    }

    .invitation {
      display: none;
      opacity: 0;
      transition: opacity 1.5s ease-in;
    }

    /* FIXED: Dana's Image Alignment */
.profile-img {
  width: 220px;
  height: 220px;
  object-fit: cover; 
  object-position: center 10%; /* This "pulls" the photo down to show the face */
  border-radius: 50%;
  border: 4px solid #ffffff;
}

    .info-img {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      border: 2px solid #ffffff;
      margin-top: 25px;
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    }

    .line {
      overflow: hidden;
      white-space: normal;
      width: 0;
      margin: 12px auto;
      font-size: 1.3rem;
      border-right: 2px solid transparent;
      animation: typing 3s steps(40, end) forwards;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    /* Timing for the reveal */
    .line:nth-child(2) { animation-delay: 1.5s; }
    .line:nth-child(3) { animation-delay: 4.5s; }
    .line:nth-child(4) { animation-delay: 7.5s; }
    .line:nth-child(5) { animation-delay: 10.5s; }

    h1.line { font-size: 2.2rem; margin-bottom: 20px; }
  </style>
</head>

<body>
  <audio id="bg-music" loop>
    <source src="million-dreams.mp3" type="audio/mpeg">
  </audio>

  <div class="petals"></div>

  <div class="container">
    <div id="intro-section">
      <div class="envelope" id="envelope"></div>
      <p class="invite-text" id="invite-text">You're invited! Click me</p>
    </div>

    <div id="invitation" class="invitation">
      <img src="dana-photo.jpg" alt="Dana" class="profile-img">

      <h1 class="line">Dana is turning 18!!</h1>
      <p class="line">We happily invite you to her party!</p>
      <p class="line">May 19, 2026, 5:00pm</p>
      <p class="line">at Florenceville Private Resort & Events Place <br> General Trias Cavite</p>
      
      <img src="location-venue.jpeg" alt="Venue" class="info-img">
    </div>
  </div>

  <script>
    const envelope = document.getElementById("envelope");
    const invitation = document.getElementById("invitation");
    const music = document.getElementById("bg-music");

    document.addEventListener("click", () => {
      music.play().catch(e => console.log("Music blocked"));
    }, { once: true });

    envelope.addEventListener("click", () => {
      envelope.classList.add("open");
      setTimeout(() => {
        document.getElementById("intro-section").style.display = "none";
        invitation.style.display = "block";
        setTimeout(() => { 
            invitation.style.opacity = "1";
            document.body.style.overflowY = "auto";
        }, 100);
      }, 600);
    });
  </script>
</body>
</html>
