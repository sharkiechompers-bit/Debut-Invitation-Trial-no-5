<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dana’s 18th Birthday Invitation</title>

  <style>
    @font-face {
      font-family: "Brush Script MT";
      src: url("./BRUSHSCI.TTF") format("truetype");
    }

    /* Global reset for full-screen images */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column; /* Stack sections vertically */
      align-items: center;
      background: url('red-roses-bg.png') no-repeat center center fixed;
      background-size: cover; 
      font-family: "Brush Script MT", cursive;
      color: #ffffff;
    }

    /* Falling Petals */
    .petals {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('petals.png') repeat;
      animation: petalFall 25s linear infinite;
      opacity: 0.3;
      filter: brightness(1.5);
      pointer-events: none;
      z-index: 10;
    }

    @keyframes petalFall {
      from { background-position: 0 0; }
      to { background-position: 500px 1000px; }
    }

    .container {
      width: 90%;
      max-width: 500px;
      margin-top: 10vh;
      text-align: center;
      position: relative;
      z-index: 2;
      padding-bottom: 50px;
    }

    #intro-section {
      animation: fadeInIntro 2s ease-out forwards;
    }

    @keyframes fadeInIntro {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .envelope {
      width: 280px;
      height: 200px;
      background: url('red-env.png') no-repeat center/contain;
      cursor: pointer;
      margin: 20px auto; 
      transition: transform 0.8s ease-out, opacity 0.5s;
    }

    .envelope.open {
      transform: translateY(-50px) scale(0.5);
      opacity: 0;
    }

    .invite-text {
      font-size: 2rem;
      color: #ffffff;
      margin-bottom: 10px;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .invitation {
      display: none;
      opacity: 0;
      transition: opacity 1.5s ease-in;
    }

    /* CHANGED: Profile Image to Rectangle */
    .profile-img {
      width: 280px; /* Slightly wider */
      height: 350px; /* Taller rectangle */
      object-fit: cover; 
      border-radius: 15px; /* Soft rectangle corners */
      border: 4px solid #ffffff;
      margin-bottom: 20px;
    }

    /* Full Screen Image Sections */
    .full-screen-img {
      width: 100vw;
      height: 100vh;
      display: block;
      object-fit: cover;
      margin: 0;
      padding: 0;
      border: none;
    }

    /* Timer Style */
    #timer-display {
      font-family: "Times New Roman", Times, serif;
      font-size: 2.5rem;
      color: #ffffff;
      margin: 30px 0;
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
      animation: fadeInIntro 3s ease-in;
    }

    .info-img {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      border: 2px solid #ffffff;
      margin-top: 25px;
    }

    .line {
      overflow: hidden;
      white-space: normal;
      width: 0;
      margin: 12px auto;
      font-size: 1.5rem;
      border-right: 2px solid transparent;
      animation: typing 3s steps(40, end) forwards;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    .line:nth-child(2) { animation-delay: 1.5s; }
    .line:nth-child(3) { animation-delay: 4.5s; }
    .line:nth-child(4) { animation-delay: 7.5s; }
    .line:nth-child(5) { animation-delay: 10.5s; }

    h1.line { font-size: 2.5rem; margin-bottom: 20px; }
  </style>
</head>

<body>
  <audio id="bg-music" loop>
    <source src="iseethelight.mp3" type="audio/mpeg">
  </audio>

  <div class="petals"></div>

  <div class="container">
    <div id="intro-section">
      <p class="invite-text">You're invited! Click please! ↓ </p>
      <div class="envelope" id="envelope"></div>
    </div>

    <div id="invitation" class="invitation">
      <!-- RECTANGLE PHOTO -->
      <img src="dana-photo.png" alt="Dana" class="profile-img">

      <h1 class="line">Dana is turning 18!!</h1>
      
      <!-- THE TIMER -->
      <div id="timer-display">Loading Timer...</div>

      <p class="line">We happily invite you to her party!</p>
      <p class="line">May 19, 2026, 5:00pm</p>
      <p class="line">at Florenceville Private Resort & Events Place <br> General Trias Cavite</p>
      
      <img src="location-venue.png" alt="Venue" class="info-img">
    </div>
  </div>

  <!-- FULL SCREEN LIST PHOTOS -->
  <div id="extra-photos" style="display:none;">
    <img src="18-roses.png" class="full-screen-img">
    <img src="18-treasures.png" class="full-screen-img">
    <img src="18-bluebills.png" class="full-screen-img">
  </div>

  <script>
    const envelope = document.getElementById("envelope");
    const invitation = document.getElementById("invitation");
    const extraPhotos = document.getElementById("extra-photos");
    const music = document.getElementById("bg-music");

    document.addEventListener("click", () => {
      music.play().catch(e => console.log("Music blocked"));
    }, { once: true });

    envelope.addEventListener("click", () => {
      envelope.classList.add("open");
      setTimeout(() => {
        document.getElementById("intro-section").style.display = "none";
        invitation.style.display = "block";
        extraPhotos.style.display = "block"; // Show full screen photos
        setTimeout(() => { 
            invitation.style.opacity = "1";
            document.body.style.overflowY = "auto";
        }, 100);
      }, 600);
    });

    // TIMER LOGIC
    var countDownDate = new Date("May 19, 2026 17:00:00").getTime();
    setInterval(function() {
      var now = new Date().getTime();
      var distance = countDownDate - now;
      var days = Math.floor(distance / (1000 * 60 * 60 * 24));
      var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      var seconds = Math.floor((distance % (1000 * 60)) / 1000);
      document.getElementById("timer-display").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s";
    }, 1000);
  </script>
</body>
</html>
